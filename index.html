<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>파스텔 영구 가계부 - +32 완결판</title>
    <style>
        :root {
            --bg-color: #fefcfd; --container-bg: #ffffff; --border-color: #f1f3f5;
            --holiday-color: #ff6b6b; --season-color: #51cf66; --normal-day-color: #495057;
            --sat-color: #74c0fc; --memo-bg: #fff9db; --text-main: #212529; --text-sub: #868e96;
            --input-bg: #f8f9fa; --income-color: #ff6b6b; --expense-color: #4dabf7;
        }
        body.dark-mode {
            --bg-color: #121212; --container-bg: #1e1e1e; --border-color: #333333;
            --holiday-color: #ff8787; --season-color: #8ce99a; --normal-day-color: #adb5bd;
            --sat-color: #a5d8ff; --memo-bg: #2d2d1a; --text-main: #f8f9fa; --text-sub: #adb5bd;
            --input-bg: #2c2e33; --income-color: #ff8787; --expense-color: #74c0fc;
        }
html {
  font-size: clamp(8px, 1.8vw, 16px);
}

body {
  margin: 0;
  padding: 0;
  font-family: 'Pretendard', 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
  background: var(--bg-color);
  overflow-x: hidden;
  overflow-y: auto;
  touch-action: pan-x pan-y;
}

#app {
  display: flex;
  flex-direction: column;
  width: 100%;
  min-height: 100vh;
  padding: clamp(2px, 0.8vh, 8px) clamp(4px, 1vw, 10px);
  box-sizing: border-box;
  transform-origin: top left;
  will-change: transform;
}
        
.header { 
    display: flex; 
    align-items: center; 
    justify-content: space-between; 
    margin-bottom: clamp(2px, 0.5vh, 5px);
    min-height: 0;
    height: clamp(28px, 5vh, 48px);
    padding: 0 clamp(2px, 0.8vw, 6px);
    flex-shrink: 0; 
}

.header-left { 
    display: flex; 
    align-items: center; 
    gap: clamp(3px, 1.2vw, 8px);
    flex: 1;
}

.header-right { 
    display: flex; 
    align-items: center; 
    gap: clamp(3px, 1.2vw, 8px); 
    justify-content: flex-end; 
    flex: 1;
}

/* 중앙 타이틀 영역 */
.nav-center { 
    display: flex; 
    align-items: center; 
    gap: clamp(3px, 0.8vw, 6px);
    background: var(--container-bg); 
    padding: clamp(3px, 0.8vw, 6px) clamp(6px, 2vw, 14px);
    border-radius: 30px; 
    box-shadow: 0 4px 10px rgba(0,0,0,0.03); 
    flex-shrink: 0;
    z-index: 10;
}

        .logo-placeholder { 
            width: clamp(44px, 8vw, 76px);
            height: clamp(20px, 4vh, 32px);
            background: #eee; 
            border-radius: 8px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: clamp(0.42rem, 1vw, 0.58rem);
            color: #aaa; 
            border: 1px dashed #ccc; 
            flex-shrink: 0;
        }

        .search-box { 
            position: relative; 
        }

        .search-box input { 
            border: 2px solid #eee; 
            border-radius: 20px; 
            padding: clamp(3px, 0.8vw, 6px) clamp(6px, 1.5vw, 12px);
            width: clamp(70px, 12vw, 130px);
            font-size: clamp(0.6rem, 1.2vw, 0.85rem);
            outline: none; 
            background: var(--container-bg); 
            color: var(--text-main); 
        }
        .nav-center { justify-self: center; display: flex; align-items: center; gap: clamp(3px, 0.8vw, 8px); background: var(--container-bg); padding: clamp(2px, 0.5vh, 5px) clamp(8px, 2vw, 15px); border-radius: 30px; box-shadow: 0 4px 10px rgba(0,0,0,0.03); }
        .nav-btn { cursor: pointer; border: none; background: var(--input-bg); color: var(--text-main); border-radius: 50%; width: clamp(18px, 3.5vh, 28px); height: clamp(18px, 3.5vh, 28px); font-weight: bold; font-size: clamp(0.65rem, 1.8vh, 1rem); }
        select { border: none; font-size: clamp(0.72rem, 1.8vh, 1rem); font-weight: bold; background: transparent; color: var(--text-main); outline: none; }

.grid-main {
  display: grid;
  grid-template-columns: repeat(8, 1fr);
  /* grid-template-rows는 JS에서 5주/6주에 따라 동적으로 설정 */

  flex: 1;
  gap: clamp(0.15rem, 0.4vh, 0.45rem);
  padding: clamp(0.2rem, 0.5vh, 0.6rem);

  background: var(--container-bg);
  border-radius: clamp(0.6rem, 1.5vw, 1.4rem);

  overflow: visible;
}
        .cell { border: 1px solid var(--border-color); border-radius: clamp(6px, 1.2vw, 12px); display: flex; flex-direction: column; overflow: hidden; background: var(--container-bg); position: relative; }
        .split-memo { background: var(--memo-bg); border: 1px dashed #ffd43b; }
        .split-memo textarea { width: 100%; height: 100%; border: none; background: transparent; resize: none; padding: clamp(2px, 0.5vw, 5px); font-size: clamp(0.5rem, 1vw, 0.75rem); color: var(--text-main); box-sizing: border-box; outline: none; }
        .day-label { text-align: center; font-weight: bold; font-size: clamp(0.5rem, 1vw, 0.75rem); line-height: clamp(18px, 3.5vw, 26px); color: var(--text-sub); background: var(--input-bg); }
        .sat { color: var(--sat-color) !important; } .sun { color: var(--holiday-color) !important; }

        .date-top-row { display: flex; justify-content: space-between; padding: clamp(1px, 0.3vh, 3px) clamp(3px, 0.8vw, 7px); cursor: pointer; height: auto; min-height: 0; align-items: flex-start; flex-shrink: 0; overflow: hidden; }
        .left-info-stack { display: grid; grid-template-columns: auto 1fr; column-gap: clamp(2px, 0.4vw, 4px); flex: 1; line-height: 1.0; min-width: 0; overflow: hidden; }
        .date-num { grid-row: 1/4; grid-column: 1; font-weight: bold; font-size: clamp(0.65rem, 1.4vw, 1.1rem); line-height: 1; color: var(--text-main); padding-top: 1px; }
        
        .line-1, .line-2, .line-3 { grid-column: 2; font-size: clamp(0.36rem, 0.7vw, 0.55rem); font-weight: bold; line-height: 1.15; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; min-width: 0; }
        .txt-red { color: var(--holiday-color) !important; } .txt-green { color: var(--season-color) !important; } .txt-black { color: var(--normal-day-color); }
        
        .money-info-group { display: flex; flex-direction: column; text-align: right; width: clamp(28px, 5.5vw, 50px); font-size: clamp(0.33rem, 0.68vw, 0.55rem); line-height: 1.15; color: var(--text-main); flex-shrink: 0; margin-left: 2px; }
        .in-s { color: var(--income-color); font-weight: bold; } .out-s { color: var(--expense-color); font-weight: bold; } 
        .bal-s { font-weight: 900; color: var(--text-main); }

        .cell-memos { flex-grow: 1; display: flex; flex-direction: column; padding: clamp(1px, 0.3vw, 2px); gap: 1px; overflow: hidden; }
        .cell-memos textarea { flex: 1; border: none; background: var(--input-bg); color: var(--text-main); border-radius: clamp(3px, 0.6vw, 6px); padding: clamp(1px, 0.3vw, 3px) clamp(2px, 0.5vw, 4px); font-size: clamp(0.5rem, 1vw, 0.78rem); resize: none; line-height: 1.1; outline: none; scrollbar-width: none; }
        /* 이전달/다음달 날짜 — 흐리게, 메모 입력 비활성 */
        .cell.other-month { opacity: 0.32; background: var(--input-bg); }
        .cell.other-month .cell-memos textarea { pointer-events: none; background: transparent; }
        
        .week-cell { background: var(--input-bg); padding: clamp(2px, 0.5vw, 4px); box-sizing: border-box; }
        .week-box { height: 48.5%; border: 1px solid var(--border-color); border-radius: clamp(4px, 0.8vw, 8px); background: var(--container-bg); margin-bottom: 3%; padding: clamp(2px, 0.5vw, 4px); display: flex; flex-direction: column; overflow: hidden; box-sizing: border-box; }
        .week-box:last-child { margin-bottom: 0; }
        .week-title { font-size: clamp(0.42rem, 0.85vw, 0.65rem); color: #ccc; font-weight: bold; margin-bottom: 2px; flex-shrink: 0; transition: all 0.15s; }
        .week-box.editing .week-title { display: none; }
        .week-text { flex-grow: 1; font-size: clamp(0.48rem, 0.95vw, 0.72rem); color: #888; outline: none; overflow-y: auto; white-space: pre-wrap; word-break: break-all; scrollbar-width: none; }

        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; justify-content: center; align-items: center; z-index: 5000; }
        .modal-content { background: var(--container-bg); color: var(--text-main); padding: clamp(12px, 3vw, 22px); border-radius: 20px; width: 90%; max-width: 340px; box-shadow: 0 15px 50px rgba(0,0,0,0.2); box-sizing: border-box; font-size: clamp(0.75rem, 2vw, 1rem); }
        .confirm-btn { width: 100%; border: none; background: #d3f9d8; color: #2b8a3e; padding: clamp(10px, 2.5vw, 16px); border-radius: 12px; font-weight: bold; cursor: pointer; font-size: clamp(0.8rem, 2vw, 1rem); }
        #search-res { position: absolute; top: clamp(36px, 7vw, 54px); left: 0; width: clamp(180px, 30vw, 260px); max-height: 300px; background: var(--container-bg); border-radius: 15px; border: 1px solid var(--border-color); box-shadow: 0 10px 25px rgba(0,0,0,0.1); z-index: 2000; overflow-y: auto; display: none; scrollbar-width: none; }
    </style>
</head>

<body>
<div id="app">
    <div class="header">
        <div class="header-left"><div class="logo-placeholder">LOGOOOOO</div><div class="search-box"><input type="text" id="searchInput" placeholder="검색..." onkeyup="searchMemos()"><div id="search-res"></div></div></div>
        <div class="nav-center"><button class="nav-btn" onclick="moveYear(-1)">«</button><button class="nav-btn" onclick="moveMonth(-1)">‹</button><div class="current-view"><select id="yearSelect" onchange="jump()"></select>년 <select id="monthSelect" onchange="jump()"></select>월</div><button class="nav-btn" onclick="moveMonth(1)">›</button><button class="nav-btn" onclick="moveYear(1)">»</button></div>
        <div class="header-right">
            <div onclick="openSettings()" style="cursor:pointer; color:var(--text-sub);">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="3"></circle>
                <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
              </svg>
            </div>
        </div>
    </div>
    <div class="grid-main" id="mainGrid"></div>
</div>
<!-- 모달 레이어들 -->
<div id="modal" class="modal" onclick="if(event.target==this) closeModal()">
    <div class="modal-content">
        <div id="modalTitle" style="font-weight:bold; text-align:center; margin-bottom:15px; border-bottom:1px solid var(--border-color); padding-bottom:5px;"></div>
        <div class="input-row" style="display:flex; gap:6px; margin-bottom:10px; width:100%; box-sizing:border-box;"><input type="text" id="inName" placeholder="수입 내용" style="flex:1.6; min-width:0; padding:8px 10px; border:1.5px solid var(--border-color); border-radius:10px; background:var(--input-bg); color:var(--text-main); font-size:clamp(0.75rem,2vw,0.95rem); box-sizing:border-box; outline:none;"><input type="number" id="inAmt" placeholder="금액" style="flex:1; min-width:0; padding:8px 10px; border:1.5px solid var(--border-color); border-radius:10px; background:var(--input-bg); color:var(--text-main); font-size:clamp(0.75rem,2vw,0.95rem); box-sizing:border-box; outline:none;"></div>
        <div class="input-row" style="display:flex; gap:6px; margin-bottom:12px; width:100%; box-sizing:border-box;"><input type="text" id="outName" placeholder="지출 내용" style="flex:1.6; min-width:0; padding:8px 10px; border:1.5px solid var(--border-color); border-radius:10px; background:var(--input-bg); color:var(--text-main); font-size:clamp(0.75rem,2vw,0.95rem); box-sizing:border-box; outline:none;"><input type="number" id="outAmt" placeholder="금액" style="flex:1; min-width:0; padding:8px 10px; border:1.5px solid var(--border-color); border-radius:10px; background:var(--input-bg); color:var(--text-main); font-size:clamp(0.75rem,2vw,0.95rem); box-sizing:border-box; outline:none;"></div>
        <button class="confirm-btn" onclick="quickSave()">확인</button>
        <div id="historyList" style="margin-top:15px; max-height:100px; overflow-y:auto; font-size:0.75rem; border-top:1px solid var(--border-color); padding-top:10px; scrollbar-width: none;"></div>
        <button onclick="closeModal()" style="width:100%; border:none; background:none; color:#aaa; font-size:0.8rem; margin-top:15px; cursor:pointer;">닫기</button>
    </div>
</div>

<div id="settingsModal" class="modal" onclick="if(event.target==this) this.style.display='none'">
    <div class="modal-content">
        <div style="font-weight:bold; text-align:center; margin-bottom:20px;">설정</div>
        <div style="display:flex; justify-content:space-between; margin-bottom:15px;"><span>야간 모드</span><button onclick="toggleDark()" id="darkBtn" style="padding:5px 10px; border-radius:8px; border:1px solid #ccc;">OFF</button></div>
        <div style="display:flex; justify-content:space-between; margin-bottom:15px;"><span>시작 요일</span><button onclick="toggleStartDay()" id="startDayBtn" style="padding:5px 10px; border-radius:8px; border:1px solid #ccc;">월요일</button></div>


<div style="display:flex; justify-content:space-between; align-items:center;"><span>데이터 관리</span>
<div><button onclick="exportData()" style="padding:5px 10px; font-size:0.7rem; border-radius:5px; border:1px solid #ccc;">백업</button><button onclick="document.getElementById('importFile').click()" style="padding:5px 10px; font-size:0.7rem; border-radius:5px; border:1px solid #ccc;">복원</button></div></div>
        <input type="file" id="importFile" style="display:none" onchange="importData(this)">
        <button class="confirm-btn" style="margin-top:20px; background:#eee; color:#333;" onclick="document.getElementById('settingsModal').style.display='none'">닫기</button>
    </div>
</div>

<script>
    const LUNAR_DATA = { 
        2024:{seol:"2-10", budda:"5-15", chuseok:"9-17"}, 2025:{seol:"1-29", budda:"5-5", chuseok:"10-6"}, 
        2026:{seol:"2-17", budda:"5-24", chuseok:"9-25"}, 2027:{seol:"2-6", budda:"5-13", chuseok:"9-15"}, 
        2028:{seol:"1-26", budda:"5-2", chuseok:"10-3"}, 2029:{seol:"2-13", budda:"5-20", chuseok:"9-22"}, 
        2030:{seol:"2-2", budda:"5-9", chuseok:"9-12"} 
    };

    function getHolidays(y, m, d) {
        let res = null;
        const RED = { "1-1":"신정","3-1":"삼일절","5-5":"어린이날","6-6":"현충일","8-15":"광복절","10-3":"개천절","10-9":"한글날","12-25":"성탄절" };
        const BLACK = { "5-1":"근로자의날","5-8":"어버이날","5-15":"스승의날","10-1":"국군의날" };
        const dt = new Date(y, m-1, d); const day = dt.getDay(); 

        const lunar = LUNAR_DATA[y];
        if(lunar) {
            if(`${m}-${d}`===lunar.budda) res={t:"석가탄신일",c:"txt-red"};
            const [sm,sd]=lunar.seol.split('-').map(Number);
            if([`${sm}-${sd-1}`,`${sm}-${sd}`,`${sm}-${sd+1}`].includes(`${m}-${d}`)) res={t:"설날연휴",c:"txt-red"};
            const [cm,cd]=lunar.chuseok.split('-').map(Number);
            if([`${cm}-${cd-1}`,`${cm}-${cd}`,`${cm}-${cd+1}`].includes(`${m}-${d}`)) res={t:"추석연휴",c:"txt-red"};
            
            // 설날/추석 대체공휴일 정밀 계산 (연휴 중 일요일이 포함되면 다음 비공휴일 하루 대체)
            const isSeolSun = [new Date(y,sm-1,sd-1).getDay(), new Date(y,sm-1,sd).getDay(), new Date(y,sm-1,sd+1).getDay()].includes(0);
            if(isSeolSun && m===sm && d===sd+2) res={t:"대체공휴일",c:"txt-red"};
            const isChuseokSun = [new Date(y,cm-1,cd-1).getDay(), new Date(y,cm-1,cd).getDay(), new Date(y,cm-1,cd+1).getDay()].includes(0);
            if(isChuseokSun && m===cm && d===cd+2) res={t:"대체공휴일",c:"txt-red"};
        }

        // 고정일 공휴일 국경일 대체 (삼일절, 광복절, 개천절, 한글날, 어린이날, 성탄절)
        if(!res && RED[`${m}-${d}`]) res={t:RED[`${m}-${d}`],c:"txt-red"};
        const replaceList = ["3-1","5-5","8-15","10-3","10-9","12-25"];
        replaceList.forEach(s => {
            const [mm,dd]=s.split('-').map(Number); const oDay=new Date(y,mm-1,dd).getDay();
            if(oDay===0 && m===mm && d===dd+1) res={t:"대체공휴일",c:"txt-red"}; // 일요일 -> 월요일
            if(oDay===6 && m===mm && d===dd+2) res={t:"대체공휴일",c:"txt-red"}; // 토요일 -> 월요일
        });

        // 부처님오신날 대체공휴일 (토/일이면 월요일)
        if(lunar && !res) {
            const [bm,bd]=lunar.budda.split('-').map(Number); const bDay=new Date(y,bm-1,bd).getDay();
            if(m===bm && ((bDay===0 && d===bd+1)||(bDay===6 && d===bd+2))) res={t:"대체공휴일",c:"txt-red"};
        }

        if(!res && BLACK[`${m}-${d}`]) res={t:BLACK[`${m}-${d}`],c:"txt-black"};
        return res;
    }

    function get24Seasons(m, d) {
        const s = { "1-5":"소한","1-20":"대한","2-4":"입춘","2-19":"우수","3-5":"경칩","3-20":"춘분","4-5":"청명","4-20":"곡우","5-5":"입하","5-21":"소만","6-5":"망종","6-21":"하지","7-7":"소서","7-22":"대서","8-7":"입추","8-23":"처서","9-7":"백로","9-23":"추분","10-8":"한로","10-23":"상강","11-7":"입동","11-22":"소설","12-7":"대설","12-22":"동지" };
        return s[`${m}-${d}`] ? {t:s[`${m}-${d}`], c:"txt-green"} : null;
    }

    // ── 핀치 줌 (두 손가락 확대/축소) ──────────────────────────
    (function() {
        const app = document.getElementById('app');
        let scale = 1, minScale = 0.4, maxScale = 3;
        let startDist = 0, startScale = 1;
        let isPinching = false;

        function getDist(t) {
            const dx = t[0].clientX - t[1].clientX;
            const dy = t[0].clientY - t[1].clientY;
            return Math.sqrt(dx*dx + dy*dy);
        }

        document.addEventListener('touchstart', function(e) {
            if (e.touches.length === 2) {
                isPinching = true;
                startDist = getDist(e.touches);
                startScale = scale;
                e.preventDefault();
            }
        }, { passive: false });

        document.addEventListener('touchmove', function(e) {
            if (isPinching && e.touches.length === 2) {
                const dist = getDist(e.touches);
                scale = Math.min(maxScale, Math.max(minScale, startScale * (dist / startDist)));
                app.style.transform = `scale(${scale})`;
                app.style.transformOrigin = 'top left';
                app.style.width = `${100 / scale}%`;
                e.preventDefault();
            }
        }, { passive: false });

        document.addEventListener('touchend', function(e) {
            if (e.touches.length < 2) {
                isPinching = false;
            }
        });
    })();
    // ──────────────────────────────────────────────────────────

    let curr = new Date();
    const dbKey = "pastel_eternal_final_v32";
    let db = JSON.parse(localStorage.getItem(dbKey)) || { isDark: false, startDaySun: false };
    let activeKey = "";

    function save() { localStorage.setItem(dbKey, JSON.stringify(db)); }
    window.onload = function() {
        if(db.isDark) document.body.classList.add('dark-mode');
        document.getElementById('darkBtn').innerText = db.isDark ? "ON" : "OFF";
        document.getElementById('startDayBtn').innerText = db.startDaySun ? "일요일" : "월요일";
        init();
    };

    

    function init() { renderSelectors(); renderCalendar(); }
    function toggleDark() { db.isDark = !db.isDark; document.body.classList.toggle('dark-mode', db.isDark); document.getElementById('darkBtn').innerText = db.isDark ? "ON" : "OFF"; save(); }
    function toggleStartDay() { db.startDaySun = !db.startDaySun; document.getElementById('startDayBtn').innerText = db.startDaySun ? "일요일" : "월요일"; save(); init(); }
    function openSettings() { document.getElementById('settingsModal').style.display = 'flex'; }
    function closeModal() { document.getElementById('modal').style.display = 'none'; }

    function jump() { 
        curr = new Date(document.getElementById('yearSelect').value, document.getElementById('monthSelect').value-1, 1); 
        renderCalendar(); 
    }
    function moveMonth(v) { curr.setMonth(curr.getMonth() + v); init(); }
    function moveYear(v) { curr.setFullYear(curr.getFullYear() + v); init(); }


    function exportData() {
        const blob = new Blob([JSON.stringify(db)], {type:'application/json'});
        const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = '가계부백업.json'; a.click();
    }

    function importData(input) {
        const reader = new FileReader();
        reader.onload = (e) => { try { db = JSON.parse(e.target.result); save(); location.reload(); } catch(e){alert("파일이 올바르지 않습니다.");} };
        reader.readAsText(input.files[0]);
    }

    function renderSelectors() {
        const yS = document.getElementById('yearSelect'), mS = document.getElementById('monthSelect');
        yS.innerHTML = ''; mS.innerHTML = '';
        for(let i=2024; i<=2035; i++){ let o = new Option(i, i); if(i===curr.getFullYear()) o.selected=true; yS.add(o); }
        for(let i=1; i<=12; i++){ let o = new Option(i, i); if(i===curr.getMonth()+1) o.selected=true; mS.add(o); }
    }

    function renderCalendar() {
        const grid = document.getElementById('mainGrid'); grid.innerHTML = '';
        const y = curr.getFullYear(), m = curr.getMonth();
        const lastD = new Date(y, m+1, 0).getDate();
        const firstD = new Date(y, m, 1).getDay();
        let startIdx = db.startDaySun ? firstD : (firstD===0?6:firstD-1);

        // 5주로 끝나는지 6주 필요한지 계산
        const totalCells = startIdx + lastD;
        const numWeeks = Math.ceil(totalCells / 7);  // 5 or 6

        // grid rows 동적 설정: 상단메모 | 요일 | N주 | 하단메모
        grid.style.gridTemplateRows = `1fr clamp(1rem,2.2vh,1.6rem) repeat(${numWeeks},1fr) 1fr`;

        // 상단 메모
        for(let i=0; i<8; i++){ const k=`fixed-top-${i}`; const c=document.createElement('div'); c.className="cell split-memo"; c.innerHTML=`<textarea onblur="db['${k}']=this.value; save()">${db[k]||''}</textarea>`; grid.appendChild(c); }

        // 요일 헤더
        const days = db.startDaySun ? ['주차','일','월','화','수','목','금','토'] : ['주차','월','화','수','목','금','토','일'];
        days.forEach(d => { const c=document.createElement('div'); c.className=`day-label ${d==='토'?'sat':(d==='일'||d==='주차'?'sun':'')}`; c.innerText=d; grid.appendChild(c); });

        // 이전달 정보
        const prevMonthLastD = new Date(y, m, 0).getDate();
        const prevY = m===0 ? y-1 : y, prevM = m===0 ? 12 : m;
        const nextY = m===11 ? y+1 : y, nextM = m===11 ? 1 : m+2;

        let dateCount=1, runningBal=0, lastRec=0, nextDateCount=1;
        for(let d=1; d<=lastD; d++) if(db[`${y}-${m+1}-${d}`]?.entries?.length>0) lastRec=d;

        for(let w=0; w<numWeeks; w++) {
            // 주차 셀
            const weekCell=document.createElement('div'); weekCell.className="cell week-cell";
            weekCell.innerHTML=`<div class="week-box"><div class="week-title">${w+1}주 계획</div><div class="week-text" contenteditable="true" onfocus="this.closest('.week-box').classList.add('editing')" onblur="this.closest('.week-box').classList.remove('editing'); saveWeek(${y},${m+1},${w},'plan',this)">${getWeekData(y,m+1,w,'plan')}</div></div><div class="week-box"><div class="week-title">${w+1}주 평가</div><div class="week-text" contenteditable="true" onfocus="this.closest('.week-box').classList.add('editing')" onblur="this.closest('.week-box').classList.remove('editing'); saveWeek(${y},${m+1},${w},'eval',this)">${getWeekData(y,m+1,w,'eval')}</div></div>`;
            grid.appendChild(weekCell);

            for(let d=0; d<7; d++) {
                const c=document.createElement('div');
                const idx = w*7+d;

                if(idx < startIdx) {
                    // 이전달 날짜
                    const prevDay = prevMonthLastD - (startIdx - 1 - idx);
                    const prevDI = new Date(prevY, prevM-1, prevDay).getDay();
                    const prevH = getHolidays(prevY, prevM, prevDay), prevS = get24Seasons(prevM, prevDay);
                    let prevLines=[]; if(prevS)prevLines.push(prevS); if(prevH)prevLines.push(prevH);
                    c.className="cell other-month";
                    c.innerHTML=`<div class="date-top-row"><div class="left-info-stack"><span class="date-num ${prevDI===0?'sun':(prevDI===6?'sat':'')}">${prevDay}</span>${prevLines.map((l,i)=>`<span class="line-${i+1} ${l.c}">${l.t}</span>`).join('')}</div><div class="money-info-group"></div></div><div class="cell-memos"><textarea></textarea><textarea></textarea><textarea></textarea></div>`;
                } else if(dateCount <= lastD) {
                    // 이번달 날짜
                    c.className="cell";
                    const k=`${y}-${m+1}-${dateCount}`, dI=new Date(y,m,dateCount).getDay(), dayD=db[k]||{entries:[]};
                    let tin=0, tout=0; dayD.entries.forEach(e=>{if(e.type==='in')tin+=Number(e.amount);else tout+=Number(e.amount);});
                    runningBal+=(tin-tout);
                    const h=getHolidays(y,m+1,dateCount), s=get24Seasons(m+1,dateCount);
                    let lines=[]; if(s)lines.push(s); if(h)lines.push(h);
                    c.innerHTML=`<div class="date-top-row" onclick="openModal('${k}')"><div class="left-info-stack"><span class="date-num ${dI===0?'sun':(dI===6?'sat':'')}">${dateCount}</span>${lines.map((l,i)=>`<span class="line-${i+1} ${l.c}">${l.t}</span>`).join('')}</div><div class="money-info-group">${dateCount<=lastRec?`<span class="in-s">+${tin.toLocaleString()}</span><span class="out-s">-${tout.toLocaleString()}</span><span class="bal-s">${runningBal.toLocaleString()}</span>`:''}</div></div><div class="cell-memos"><textarea onblur="upMemo('${k}','m1',this.value)">${dayD.m1||''}</textarea><textarea onblur="upMemo('${k}','m2',this.value)">${dayD.m2||''}</textarea><textarea onblur="upMemo('${k}','m3',this.value)">${dayD.m3||''}</textarea></div>`;
                    dateCount++;
                } else {
                    // 다음달 날짜
                    const nextDI = new Date(nextY, nextM-1, nextDateCount).getDay();
                    const nextH = getHolidays(nextY, nextM, nextDateCount), nextS = get24Seasons(nextM, nextDateCount);
                    let nextLines=[]; if(nextS)nextLines.push(nextS); if(nextH)nextLines.push(nextH);
                    c.className="cell other-month";
                    c.innerHTML=`<div class="date-top-row"><div class="left-info-stack"><span class="date-num ${nextDI===0?'sun':(nextDI===6?'sat':'')}">${nextDateCount}</span>${nextLines.map((l,i)=>`<span class="line-${i+1} ${l.c}">${l.t}</span>`).join('')}</div><div class="money-info-group"></div></div><div class="cell-memos"><textarea></textarea><textarea></textarea><textarea></textarea></div>`;
                    nextDateCount++;
                }
                grid.appendChild(c);
            }
        }

        // 하단 메모
        for(let i=0; i<8; i++){ const k=`fixed-bot-${i}`; const c=document.createElement('div'); c.className="cell split-memo"; c.innerHTML=`<textarea onblur="db['${k}']=this.value; save()">${db[k]||''}</textarea>`; grid.appendChild(c); }
    }
    function getWeekData(y,m,w,t){ if(w===0){let pM=m-1,pY=y; if(pM===0){pM=12;pY--;} if(db[`${pY}-${pM}-w5-${t}`]) return db[`${pY}-${pM}-w5-${t}`];} return db[`${y}-${m}-w${w}-${t}`]||""; }
    function saveWeek(y,m,w,t,el){ db[`${y}-${m}-w${w}-${t}`]=el.innerText; if(w===5){let nM=Number(m)+1,nY=y; if(nM>12){nM=1;nY++;} db[`${nY}-${nM}-w0-${t}`]=el.innerText;} save(); }
    function upMemo(k,t,v){ if(!db[k])db[k]={entries:[],m1:'',m2:'',m3:''}; db[k][t]=v; save(); }
    function openModal(k){ activeKey=k; document.getElementById('modalTitle').innerText=k; document.getElementById('modal').style.display='flex'; renderHistory(); document.getElementById('inName').focus(); }
    function quickSave(){
        const iN=document.getElementById('inName').value, iA=document.getElementById('inAmt').value, oN=document.getElementById('outName').value, oA=document.getElementById('outAmt').value;
        if(!iA && !oA){closeModal(); return;} if(!db[activeKey])db[activeKey]={entries:[],m1:'',m2:'',m3:''};
        if(iA) db[activeKey].entries.push({name:iN||'수입', amount:iA, type:'in'}); if(oA) db[activeKey].entries.push({name:oN||'지출', amount:oA, type:'out'});
        save(); renderHistory(); renderCalendar(); document.getElementById('inName').value=''; document.getElementById('inAmt').value=''; document.getElementById('outName').value=''; document.getElementById('outAmt').value='';
    }
    function renderHistory(){ const list=document.getElementById('historyList'); list.innerHTML=''; (db[activeKey]?.entries||[]).slice().reverse().forEach(e=>{ const d=document.createElement('div'); d.style.display="flex"; d.style.justifyContent="space-between"; d.innerHTML=`<span>${e.name}</span><span style="color:${e.type==='in'?'var(--income-color)':'var(--expense-color)'}">${e.type==='in'?'+':'-'}${Number(e.amount).toLocaleString()}</span>`; list.appendChild(d); }); }
    function searchMemos(){
        const q=document.getElementById('searchInput').value, res=document.getElementById('search-res');
        if(!q){res.style.display='none'; return;} res.innerHTML=''; res.style.display='block';
        Object.keys(db).forEach(k=>{ if(k.startsWith('fixed')||['isDark','startDaySun','alarmTime'].includes(k)) return; const d=db[k], c=typeof d==='object'?`${d.m1||''} ${d.m2||''} ${d.m3||''}`:d; if(c&&c.includes(q)){ const item=document.createElement('div'); item.className='res-item'; let p=k.split('-'); item.innerHTML=`<strong>${k}</strong><br><small>${c.substring(0,20)}</small>`; item.onclick=()=>{curr=new Date(p[0],p[1]-1,1); init(); res.style.display='none';}; res.appendChild(item); } });
    }


</script>
</body>
</html>
